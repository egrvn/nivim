<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>NIVIM</title>
    <script>
      (function () {
        var base = "/nivim/";
        var path = window.location.pathname;
        var relative = path.indexOf(base) === 0 ? path.slice(base.length - 1) : path;
        var redirect = base + "?p=" + encodeURIComponent(relative + window.location.search + window.location.hash);
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
  </html>
