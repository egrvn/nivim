    <script>
      function t_onReady(func) {
        if (document.readyState !== "loading") {
          func();
        } else {
          document.addEventListener("DOMContentLoaded", func);
        }
      }

      function t_onFuncLoad(funcName, okFunc, time) {
        if (typeof window[funcName] === "function") {
          okFunc();
        } else {
          setTimeout(function () {
            t_onFuncLoad(funcName, okFunc, time);
          }, time || 100);
        }
      }

      function t396_initialScale(recid) {
        var rec = document.getElementById("rec" + recid);
        if (!rec) return;
        var artboard = rec.querySelector(".t396__artboard");
        if (!artboard) return;

        if (!window.tn_scale_initial_window_width) {
          window.tn_scale_initial_window_width = document.documentElement.clientWidth;
        }

        var windowWidth = window.tn_scale_initial_window_width;
        var screensAttr = artboard.getAttribute("data-artboard-screens");
        var screens = screensAttr ? screensAttr.split(",").map(function (screen) { return parseInt(screen, 10); }) : [320, 480, 640, 960, 1200];
        var screenWidth;

        screens.forEach(function (screen) {
          if (windowWidth >= screen) {
            screenWidth = screen;
          }
        });

        var isEditMode = window.allrecords && window.allrecords.getAttribute("data-tilda-mode") === "edit";
        var isCentered = t396_getFieldValue(artboard, "valign", screenWidth, screens) === "center";
        var isGrid = t396_getFieldValue(artboard, "upscale", screenWidth, screens) === "grid";
        var hasVhHeight = t396_getFieldValue(artboard, "height_vh", screenWidth, screens);
        var height = t396_getFieldValue(artboard, "height", screenWidth, screens);
        var isOpera = (!!window.opr && !!window.opr.addons) || !!window.opera || navigator.userAgent.indexOf(" OPR/") !== -1;

        if (!isEditMode && isCentered && !isGrid && !hasVhHeight && height && !isOpera) {
          var scale = parseFloat((windowWidth / screenWidth).toFixed(3));
          var targets = [artboard, artboard.querySelector(".t396__carrier"), artboard.querySelector(".t396__filter")];
          var scaledHeight = Math.floor(parseInt(height, 10) * scale) + "px";

          artboard.style.setProperty("--initial-scale-height", scaledHeight);
          targets.forEach(function (target) {
            if (target) {
              target.style.setProperty("height", "var(--initial-scale-height)");
            }
          });

          t396_scaleInitial__getElementsToScale(artboard).forEach(function (element) {
            element.style.zoom = scale;
          });
        }
      }

      function t396_scaleInitial__getElementsToScale(artboard) {
        return artboard
          ? Array.prototype.slice.call(artboard.children).filter(function (child) {
              return child && (child.classList.contains("t396__elem") || child.classList.contains("t396__group"));
            })
          : [];
      }

      function t396_getFieldValue(artboard, field, screenWidth, screens) {
        var value;
        var lastScreen = screens[screens.length - 1];

        if (screenWidth === lastScreen) {
          value = artboard.getAttribute("data-artboard-" + field);
        } else {
          value = artboard.getAttribute("data-artboard-" + field + "-res-" + screenWidth);
        }

        if (value) {
          return value;
        }

        for (var i = 0; i < screens.length; i += 1) {
          var screen = screens[i];
          if (screen <= screenWidth) continue;
          value =
            screen === lastScreen
              ? artboard.getAttribute("data-artboard-" + field)
              : artboard.getAttribute("data-artboard-" + field + "-res-" + screen);
          if (value) {
            break;
          }
        }

        return value;
      }

      window.TN_SCALE_INITIAL_VER = "1.0";
      window.tn_scale_initial_window_width = null;
      window.dataLayer = window.dataLayer || [];
    </script>
